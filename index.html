<script>
// ════════════════════════════════════════
// ★ 구글 스프레드시트 연동
// Apps Script 배포 URL을 여기에 붙여넣으세요
// ════════════════════════════════════════
var SHEET_URL = 'https://script.google.com/macros/s/AKfycbyWw5IjJuOGVT38_i6hEJ-oTutjODTsWkRkkYQyLGKPtDevWKJpRyf1X_0kK9ZU2_NP/exec';

// ════════════════════════════════════════
// 질문 + 가중치
// ════════════════════════════════════════
var QUESTIONS = [
  {
    q: "어떤 가족의 요금제를\n찾고 계세요?",
    opts: ["초등 저학년 아이 (1~2학년)","초등 3~4학년 아이","초등 5~6학년 아이","중학생 or 고등학생 아이","부모님 / 어르신"],
    scores: [
      [100,   0, -100, -100, -100],
      [  0, 100,    0, -100, -100],
      [-100,  0,  100, -100, -100],
      [-100,-100,  100, -100, -100],
      [-100,-100, -100,  100,  100]
    ]
  },
  {
    q: "평소에 스마트폰으로\n뭘 가장 많이 하세요?",
    opts: ["통화·카톡 위주 (~2GB)","유튜브도 가끔 (3~5GB)","유튜브·영상 자주 (10~15GB)","게임·영상 많이 (20GB+)","잘 모르겠어요"],
    scores: [
      [ 30, 10, -20,  30, -20],
      [ 10, 30,  10,  10,  30],
      [-10, 10,  30, -20,  30],
      [-20,-10,  40, -30,  10],
      [  5,  5,   5,   5,   5]
    ]
  },
  {
    q: "매달 통신비로\n얼마 정도가 마음 편하세요?",
    opts: ["5천원 이하","5천~1만원","1~2만원","2~3만원","크게 상관없어요"],
    scores: [
      [ 20, 10, -10,  20, -10],
      [ 10, 20,  10,  10,  10],
      [-10, 10,  20, -10,  20],
      [-20,-10,  30, -20,  10],
      [  5,  5,   5,   5,   5]
    ]
  },
  {
    q: "요금제에서 가장\n중요한 게 뭐예요?",
    opts: ["최대한 저렴하게","요금이 안 오르는 평생가","데이터 다 써도 끊기지 않게","통화는 맘껏 할 수 있게"],
    scores: [
      [10, 10,  0, 10,  0],
      [10, 10, 10, 10, 10],
      [ 5, 10, 20,-10, 10],
      [20, 10,  0, 20, 10]
    ]
  }
];

var TYPE_KEYS = ["kids_grade12","kids_grade34","kids_grade56","senior_basic","senior_active"];

var RESULTS = [
  { type:"초등 1~2학년\n맞춤형", desc:"이 학년에서 가장 중요한 건 부모님 연락이 언제나 닿는 것입니다. 통화 무제한에 소량 데이터면 충분하고, 평생 고정 요금이라 한 번 바꿔드리면 오래 쓸 수 있어요. 부모님 연락이 잘 닿으면서 요금이 오르지 않는 것, 그 두 가지만 보고 추렸습니다.", tags:["평생가 추천","저속 무제한","통화 무제한","월 5~7천원"], link:"https://litt.ly/smartpicks?type=kids_grade12", cat:"🎒" },
  { type:"초등 3~4학년\n맞춤형", desc:"카톡, 유튜브를 슬슬 시작하는 시기입니다. 4~6GB면 충분히 쓸 수 있고, 평생 고정 요금제로 잡아두면 중학교 올라갈 때까지 바꿀 일이 없어요. 평생 고정 요금이면서 이 가격인 것들로만 골랐습니다.", tags:["평생가 추천","4~6GB","저속 무제한","월 3~6천원"], link:"https://litt.ly/smartpicks?type=kids_grade34", cat:"📚" },
  { type:"초등 5학년~중고등\n맞춤형", desc:"친구들과 연락하고 영상도 보는 나이입니다. 7~17GB + 저속 무제한이면 데이터가 부족할 일 없이 편하게 쓸 수 있어요. 학년이 바뀌어도 다시 찾아볼 필요 없도록 넉넉하게 쓸 수 있는 것들로만 추렸습니다.", tags:["평생가 추천","7~17GB","저속 무제한","월 7~18천원"], link:"https://litt.ly/smartpicks?type=kids_grade56", cat:"📱" },
  { type:"부모님\n기본 통화형", desc:"전화 위주로 쓰시는 부모님께 딱 맞는 구조입니다. 통화 무제한에 소량 데이터면 카톡도 편하게 쓰실 수 있어요. 전화가 끊기지 않고, 요금이 오르지 않는 것만 기준으로 삼았습니다.", tags:["통화 무제한","평생가","1~3GB","월 4~7천원"], link:"https://litt.ly/smartpicks?type=senior_basic", cat:"☎️" },
  { type:"부모님\n활동형", desc:"카카오 영상통화, 지도, 유튜브까지 즐겨 쓰시는 부모님 유형입니다. 4~7GB + 저속 무제한이면 데이터가 넉넉하게 쓰실 수 있어요. 한 번 바꿔드리면 오래 쓸 수 있도록 평생 고정 요금제만 골랐습니다.", tags:["통화 무제한","평생가","4~7GB","저속 무제한"], link:"https://litt.ly/smartpicks?type=senior_active", cat:"🗺️" }
];

// ════════════════════════════════════════
// 퀴즈 로직
// ════════════════════════════════════════
var currentQ = 0;
var totalScores = [0,0,0,0,0];
var answers = [];

function show(id) {
  ['coverScreen','quizScreen','loadingScreen','resultScreen'].forEach(function(s) {
    document.getElementById(s).style.display = 'none';
  });
  document.getElementById(id).style.display = 'flex';
}

function startQuiz() {
  currentQ = 0;
  totalScores = [0,0,0,0,0];
  answers = [];
  history.pushState({screen:'quiz',q:0}, '', '');
  show('quizScreen');
  renderQuestion();
  if (typeof gtag === 'function') { gtag('event','quiz_start',{event_category:'quiz'}); }
}

function renderQuestion() {
  var q = QUESTIONS[currentQ];
  document.getElementById('qNumber').textContent = 'Q' + (currentQ+1) + '.';
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progressFill').style.width = ((currentQ)/QUESTIONS.length*100) + '%';
  document.getElementById('progressText').textContent = (currentQ+1) + '/' + QUESTIONS.length;
  var area = document.getElementById('optionsArea');
  area.innerHTML = '';
  area.className = 'options slide-in';
  q.opts.forEach(function(opt, i) {
    var btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = function() { selectOption(i); };
    area.appendChild(btn);
  });
}

function selectOption(optIdx) {
  var q = QUESTIONS[currentQ];
  for (var i = 0; i < 5; i++) { totalScores[i] += q.scores[optIdx][i]; }
  answers.push(optIdx);
  var btns = document.querySelectorAll('.option-btn');
  btns.forEach(function(b, i) { b.classList.toggle('selected', i===optIdx); b.style.pointerEvents='none'; });
  setTimeout(function() {
    currentQ++;
    if (currentQ < QUESTIONS.length) { history.pushState({screen:'quiz',q:currentQ},'',''); renderQuestion(); }
    else { showLoading(); }
  }, 400);
}

function showLoading() {
  show('loadingScreen');
  document.getElementById('progressFill').style.width = '100%';
  setTimeout(showResult, 1800);
}

function showResult() {
  var maxScore = -Infinity, maxIdx = 0;
  for (var i = 0; i < 5; i++) { if (totalScores[i] > maxScore) { maxScore = totalScores[i]; maxIdx = i; } }

  var r = RESULTS[maxIdx];
  document.getElementById('resultCat').textContent = r.cat;
  document.getElementById('resultType').textContent = r.type;
  document.getElementById('resultDesc').textContent = r.desc;
  document.getElementById('resultLink').href = r.link;

  var tagsArea = document.getElementById('resultTags');
  tagsArea.innerHTML = '';
  r.tags.forEach(function(t) {
    var span = document.createElement('span');
    span.className = 'result-tag';
    span.textContent = t;
    tagsArea.appendChild(span);
  });

  history.pushState({screen:'result'}, '', '');
  show('resultScreen');

  // GA4 이벤트
  if (typeof gtag === 'function') {
    gtag('event', 'quiz_complete', {
      event_category: 'quiz',
      event_label: TYPE_KEYS[maxIdx],
      quiz_result_type: TYPE_KEYS[maxIdx],
      quiz_scores: totalScores.join(',')
    });
  }

  // ★ 구글 스프레드시트에 결과 저장
  if (SHEET_URL && SHEET_URL !== 'https://script.google.com/macros/s/AKfycbxFKM1-aXvHTqKgHXbGsu8QJaWNOZd5sCjp_HGmD9EFvEaxiZjg_enfiiE1cOJaWSqX/exec') {
    var answerTexts = answers.map(function(ai, qi) { return QUESTIONS[qi].opts[ai]; });
    fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        q1: answerTexts[0] || '',
        q2: answerTexts[1] || '',
        q3: answerTexts[2] || '',
        q4: answerTexts[3] || '',
        result: r.type.replace('\n',' '),
        scores: totalScores.join(',')
      })
    }).catch(function(){});
  }
}

function retry() { history.pushState({screen:'cover'},'',''); show('coverScreen'); }

// 뒤로가기 처리
window.addEventListener('popstate', function(e) {
  if (e.state && e.state.screen === 'quiz') {
    if (e.state.q !== undefined && e.state.q < currentQ) {
      currentQ = e.state.q;
      totalScores = [0,0,0,0,0];
      answers = [];
      for (var i = 0; i < currentQ; i++) {
        var sr = QUESTIONS[i].scores[answers[i]];
        if (sr) { for (var j = 0; j < 5; j++) { totalScores[j] += sr[j]; } }
      }
      show('quizScreen');
      renderQuestion();
    }
  } else { show('coverScreen'); }
});
history.replaceState({screen:'cover'}, '', '');
</script>
